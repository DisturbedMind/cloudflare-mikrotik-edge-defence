services:
  nginx:
    image: nginx:1.27-alpine
    container_name: home-cinema-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOCAL_PROXY_PORT:-18080}:80"
      - "${FEED_BIND_IP:-0.0.0.0}:8088:8088"
    volumes:
      - ./nginx/home-cinema.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./feed/public:/usr/share/nginx/feed:ro
    environment:
      TZ: Africa/Johannesburg
