server {
    listen 8088;
    server_name _;

    access_log /var/log/nginx/feed-access.log combined;
    error_log /var/log/nginx/feed-error.log warn;

    location = /mikrotik/health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /mikrotik/offenders.rsc {
        root /usr/share/nginx/feed;
        try_files /offenders.rsc =404;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location = /mikrotik/offenders.txt {
        root /usr/share/nginx/feed;
        try_files /offenders.txt =404;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location = /mikrotik/metadata.json {
        root /usr/share/nginx/feed;
        try_files /metadata.json =404;
        default_type application/json;
        add_header Cache-Control "no-store";
    }
}
